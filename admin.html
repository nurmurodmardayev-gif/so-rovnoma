<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Анкета Статистикаси</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy2: #112040;
    --gold: #c9a227;
    --gold2: #e8ba30;
    --cream: #f5f0e8;
    --text: #1a2540;
    --muted: #6b7a99;
    --border: #e2ddd4;
    --card: #ffffff;
    --bg: #f4f1eb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* Login screen */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,162,39,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .login-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 20px;
    padding: 48px 40px;
    width: 360px;
    text-align: center;
    animation: fadeUp 0.6s ease;
  }

  .login-logo {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
  }

  .login-box h2 {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 22px;
    margin-bottom: 6px;
  }

  .login-box p {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .login-box input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .login-box input:focus {
    border-color: var(--gold);
  }

  .login-box input::placeholder { color: rgba(255,255,255,0.3); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 10px;
    color: var(--navy);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(201,162,39,0.4); }

  .login-error {
    color: #ff6b6b;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }

  /* Dashboard */
  #dashboard {
    display: none;
  }

  /* Topbar */
  .topbar {
    background: var(--navy);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-brand .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .topbar-brand span {
    color: white;
    font-weight: 600;
    font-size: 15px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .last-updated {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
  }

  .btn-refresh {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn-refresh:hover { background: rgba(255,255,255,0.15); }

  .btn-logout {
    background: transparent;
    border: 1px solid rgba(201,162,39,0.4);
    color: var(--gold);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: rgba(201,162,39,0.1); }

  /* Main content */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Stats cards */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-left: 4px solid var(--gold);
    animation: fadeUp 0.5s ease both;
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--navy);
    line-height: 1;
  }

  .stat-card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Section title */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Question stats */
  .q-stat-card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    animation: fadeUp 0.5s ease both;
  }

  .q-stat-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 18px;
  }

  .q-badge {
    background: var(--navy);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .q-stat-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    font-weight: 500;
  }

  /* Bar chart */
  .bar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .bar-label {
    font-size: 12.5px;
    color: #445;
    width: 260px;
    flex-shrink: 0;
    line-height: 1.4;
  }

  .bar-track {
    flex: 1;
    height: 28px;
    background: #f0ede7;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), #1e3a70);
    border-radius: 6px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    min-width: 2px;
  }

  .bar-fill.top { background: linear-gradient(90deg, var(--gold), var(--gold2)); }

  .bar-pct {
    font-size: 12px;
    font-weight: 700;
    color: white;
  }

  .bar-count {
    font-size: 12px;
    color: var(--muted);
    min-width: 30px;
    text-align: right;
  }

  /* Highlight label for most selected */
  .bar-label.top-answer {
    color: var(--navy);
    font-weight: 600;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e0d8cc;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Export btn */
  .btn-export {
    background: var(--navy);
    color: var(--gold);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-export:hover { background: var(--navy2); }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .bar-label { width: 140px; font-size: 11px; }
    .main { padding: 20px 12px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🛡</div>
    <h2>Admin Panel</h2>
    <p>Кириш учун паролни киритинг</p>
    <input type="password" id="passwordInput" placeholder="Парол" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Кириш</button>
    <p class="login-error" id="loginError">⚠ Нотўғри парол!</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo">📊</div>
      <span>Анкета Статистикаси</span>
    </div>
    <div class="topbar-right">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="btn-refresh" onclick="loadData()">↺ Янгилаш</button>
      <button class="btn-logout" onclick="logout()">Чиқиш</button>
    </div>
  </div>

  <div class="main">
    <div id="statsContent">
      <div class="loading">
        <div class="spinner"></div>
        <p>Маълумотлар юкланмоқда...</p>
      </div>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUGS-T4LJWToj_0dCBqVxha3-G1ofXcCyZtVF2rxtzpGJknhKa_5VIS7shnaPTs3E9/exec";
  const ADMIN_PASSWORD = "admin2026"; // ← ўзгартиринг!

  const questions = [
    { id: 1, text: "ИИВ органларида ахборот-таҳлилий фаолиятнинг асосий вазифалари", options: ["Ахборот тўплаш ва таҳлил қилиш", "Таҳлилий маълумотнома тайёрлаш", "Бошқарув қарорлари учун маълумот тайёрлаш", "Жавоб беришга қийналаман"] },
    { id: 2, text: "Ахборот-таҳлилий фаолиятдаги асосий муаммолар", options: ["Ахборотнинг eтишмаслиги", "Автоматлаштириш пастлиги", "Малакали кадрлар eтишмаслиги", "Раҳбариятнинг қизиқмаслиги", "Ҳужжатларга талаб йўқлиги", "Бошқа"] },
    { id: 3, text: "Ахборот-таҳлилий фаолиятнинг бугунги ҳолати", options: ["Аниқ механизмлар мавжуд", "Механизм аниқ эмас", "Механизмлар etарли эмас", "Механизмлар умуман йўқ", "Бошқа"] },
    { id: 4, text: "Ахборот-таҳлилий фаолиятнинг ташкил этилиши", options: ["Юқори даражада", "Ўрта даражада", "Қониқарсиз даражада", "Жавоб беришга қийналаман"] },
    { id: 5, text: "Энг кўп юзага келаётган муаммолар", options: ["Норматив-ҳуқуқий муаммолар", "Талабнинг камлиги", "Техник таъминлаш муаммолари", "Ходимлар малакаси", "Кадрлар etишмаслиги", "Бошқа"] },
    { id: 6, text: "Ходимларнинг хабардорлик даражаси", options: ["Умуман хабардор эмас", "Қисман хабардор", "Хабардор"] },
    { id: 7, text: "Хабардор эмасликнинг сабаби", options: ["Тўғридан-тўғри ишламайдилар", "Тушунчалар eтарли эмас", "Таҳлилий маълумот талаб қилинмайди", "Бошқа"] },
    { id: 8, text: "Такомиллаштириш учун зарур чора-тадбирлар", options: ["Норматив база такомиллаштириш", "Амалий машғулотлар", "Автоматлаштириш", "Малака ошириш", "Бошқа"] },
    { id: 9, text: "Фойдаланиладиган таҳлил усуллари", options: ["Статистик таҳлил", "Қиёсий таҳлил", "Мониторинг", "Прогнозлаштириш", "Бошқа"] },
    { id: 10, text: "Таҳлилий маълумотлар асосида қарор қабул қилинадими?", options: ["Ҳа, доимо", "Баъзида", "Камдан-кам", "Йўқ", "Жавоб беришга қийналаман"] },
    { id: 11, text: "Замонавий технологиялардан фойдаланиш", options: ["Юқори даражада", "Ўрта даражада", "Паст даражада", "Умуман фойдаланилмайди", "Жавоб беришга қийналаман"] },
    { id: 12, text: "Кадрлар малакасини ошириш зарурми?", options: ["Ҳа, жуда зарур", "Зарур, иккинчи даражали", "Унчалик зарур эмас", "Зарур эмас", "Жавоб беришга қийналаман"] },
    { id: 13, text: "Ходимларнинг иштироки", options: ["Барча ходимлар", "Айрим ходимлар", "Фақат мутахассислар", "Иштирок этмайди", "Жавоб беришга қийналаман"] },
    { id: 14, text: "Меъёрий-ҳуқуқий база ҳолати", options: ["Мукаммал ва eтарли", "Такомиллаштириш зарур", "Eтарли эмас", "Умуман мавжуд эмас", "Жавоб беришга қийналаман"] },
    { id: 15, text: "Раҳбариятнинг эътибори", options: ["Юқори даражада", "Ўрта даражада", "Eтарли эмас", "Умуман эътибор берилмайди", "Жавоб беришга қийналаман"] },
    { id: 16, text: "Илмий тадқиқотлар зарурми?", options: ["Ҳа, жуда зарур", "Зарур", "Унчалик зарур эмас", "Зарур эмас", "Жавоб беришга қийналаман"] },
    { id: 17, text: "Халқаро тажрибадан фойдаланиш", options: ["Ҳа, фойдаланиш керак", "Айрим элементларини жорий этиш", "Зарур эмас", "Жавоб беришга қийналаман"] },
    { id: 18, text: "Рағбатлантириш тизими зарурми?", options: ["Ҳа, жуда зарур", "Зарур", "Унчалик зарур эмас", "Зарур эмас", "Жавоб беришга қийналаман"] },
    { id: 19, text: "Тамойиллар ва мезонларни белгилаш таклифига муносабат", options: ["Маъқуллайман", "Қаршиман", "Жавоб беришга қийналаман"] },
    { id: 20, text: "KPI тизими жорий etиш таклифига муносабат", options: ["Маъқуллайман", "Йўқ, зарурат мавжуд эмас", "Бошқа фикрлар"] }
  ];

  window.login = function() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  };

  window.logout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  };

  window.loadData = async function() {
    document.getElementById('statsContent').innerHTML = `
      <div class="loading"><div class="spinner"></div><p>Маълумотлар юкланмоқда...</p></div>
    `;

    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=read');
      const data = await res.json();
      const responses = data.responses || [];
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('uz');
      renderDashboard(responses);
    } catch (err) {
      document.getElementById('statsContent').innerHTML = `
        <div class="loading"><p style="color:#e05">❌ Хатолик: Apps Script URLни текширинг.<br>${err.message}</p></div>
      `;
    }
  };

  function renderDashboard(responses) {
    const total = responses.length;

    // Find most consistent question
    let mostConsistentQ = null, highestPct = 0;
    questions.forEach(q => {
      const counts = {};
      responses.forEach(r => {
        const ans = r[`s${q.id}`];
        const key = Array.isArray(ans) ? ans.join('|') : ans;
        if (key) counts[key] = (counts[key] || 0) + 1;
      });
      const max = Math.max(...Object.values(counts), 0);
      const pct = total ? (max / total) * 100 : 0;
      if (pct > highestPct) { highestPct = pct; mostConsistentQ = q.id; }
    });

    // Build HTML
    let html = `
      <div class="stats-row">
        <div class="stat-card" style="animation-delay:0s">
          <div class="label">Жами иштирокчилар</div>
          <div class="value">${total}</div>
          <div class="sub">нафар мутахассис</div>
        </div>
        <div class="stat-card" style="animation-delay:0.1s">
          <div class="label">Жавобланган саволлар</div>
          <div class="value">20</div>
          <div class="sub">та савол</div>
        </div>
        <div class="stat-card" style="animation-delay:0.2s">
          <div class="label">Энг бир хил жавоб</div>
          <div class="value">${mostConsistentQ || '—'}</div>
          <div class="sub">${highestPct.toFixed(0)}% бир хил жавоб</div>
        </div>
        <div class="stat-card" style="animation-delay:0.3s">
          <div class="label">Сўнгги янгиланиш</div>
          <div class="value" style="font-size:22px">${new Date().toLocaleDateString('uz-UZ')}</div>
          <div class="sub">${new Date().toLocaleTimeString('uz')}</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="section-title" style="flex:1;margin-bottom:0">Саволлар бўйича статистика</div>
        <button class="btn-export" onclick="exportCSV()">⬇ CSV юклаш</button>
      </div>
    `;

    if (total === 0) {
      html += `<div class="loading"><p>Ҳали жавоблар мавжуд эмас.</p></div>`;
    } else {
      questions.forEach((q, qi) => {
        const counts = {};
        q.options.forEach(o => counts[o] = 0);
        responses.forEach(r => {
          const ans = r[`s${q.id}`];
          if (Array.isArray(ans)) {
            ans.forEach(a => { if (counts[a] !== undefined) counts[a]++; });
          } else if (ans && counts[ans] !== undefined) {
            counts[ans]++;
          }
        });

        const maxCount = Math.max(...Object.values(counts));

        html += `
          <div class="q-stat-card" style="animation-delay:${0.1 + qi * 0.05}s">
            <div class="q-stat-header">
              <div class="q-badge">${q.id}</div>
              <div class="q-stat-text">${q.text}</div>
            </div>
        `;

        q.options.forEach(opt => {
          const cnt = counts[opt] || 0;
          const pct = total ? Math.round((cnt / total) * 100) : 0;
          const isTop = cnt === maxCount && cnt > 0;

          html += `
            <div class="bar-item">
              <div class="bar-label ${isTop ? 'top-answer' : ''}">${opt}</div>
              <div class="bar-track">
                <div class="bar-fill ${isTop ? 'top' : ''}" style="width:${pct}%">
                  ${pct > 8 ? `<span class="bar-pct">${pct}%</span>` : ''}
                </div>
              </div>
              <div class="bar-count">${cnt}</div>
            </div>
          `;
        });

        html += `</div>`;
      });
    }

    document.getElementById('statsContent').innerHTML = html;
    window._responses = responses;
  }

  window.exportCSV = function() {
    const responses = window._responses || [];
    if (!responses.length) return;

    const headers = ['#', ...questions.map(q => `S${q.id}`), 'Vaqt'];
    const rows = responses.map((r, i) => [
      i + 1,
      ...questions.map(q => {
        const ans = r[`s${q.id}`];
        return Array.isArray(ans) ? ans.join('; ') : (ans || '');
      }),
      r.submittedAt?.toDate?.()?.toLocaleString() || ''
    ]);

    const csv = [headers, ...rows].map(row =>
      row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
    ).join('\n');

    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `anketa_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };
</script>
</body>
</html>
